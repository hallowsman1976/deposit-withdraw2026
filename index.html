<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>สอ.สธ.มุกดาหาร — ออมทรัพย์ออนไลน์</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="css/app.css" rel="stylesheet">
</head>
<body>

<div class="device" role="application" aria-label="แอปสหกรณ์ออมทรัพย์ฯ มุกดาหาร">
  <div class="screen-wrap">
    <div class="island"></div>

    <!-- status bar -->
    <div class="statusbar" id="statusbar">
      <span class="num">9:41</span>
      <span class="sb-right">
        <i class="bi bi-reception-4"></i>
        <i class="bi bi-wifi"></i>
        <i class="bi bi-battery-full"></i>
      </span>
    </div>

    <!-- LINE LIFF header -->
    <div class="liff-header" id="liffHeader">
      <button class="lh-btn" id="hdrBack" aria-label="ย้อนกลับ" style="visibility:hidden;"><i class="bi bi-chevron-left"></i></button>
      <div class="lh-title" id="hdrTitle">
        ออมทรัพย์ออนไลน์
        <small class="lh-sub" id="hdrSub">สอ.สธ.มุกดาหาร จำกัด</small>
      </div>
      <button class="lh-btn" id="hdrClose" aria-label="ปิด"><i class="bi bi-x-lg"></i></button>
    </div>

    <!-- scroll content -->
    <div class="app-scroll" id="appScroll">
      <div id="app"></div>
    </div>

    <!-- bottom nav -->
    <nav class="tabbar" id="tabbar">
      <button class="tab active" data-nav="home"><i class="bi bi-house-door"></i><span>หน้าแรก</span></button>
      <button class="tab" data-nav="deposit"><i class="bi bi-arrow-down-circle"></i><span>ฝากเงิน</span></button>
      <button class="tab" data-nav="withdraw"><i class="bi bi-arrow-up-circle"></i><span>ถอนเงิน</span></button>
      <button class="tab" data-nav="history"><i class="bi bi-clock-history"></i><span>ประวัติ</span></button>
      <button class="tab" data-nav="profile"><i class="bi bi-person"></i><span>โปรไฟล์</span></button>
    </nav>
  </div>
</div>

<!-- libs -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- app -->
<script src="js/api.js"></script>
<script src="js/icons.js"></script>
<script src="js/ui.js"></script>
<script src="js/screens-home.js"></script>
<script src="js/screens-deposit.js"></script>
<script src="js/screens-withdraw.js"></script>
<script src="js/screens-history.js"></script>
<script src="js/app.js"></script>
</body>
</html>
